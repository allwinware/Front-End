<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>event_popup</title>
    <meta name="viewport" content="width=device-width initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta http-equiv="Cache-Control" content="no-cache">
    <link rel="stylesheet" href="https://allwinware.github.io/Front-End/alphaseat/alpha_pc/resource/css/contents.css">
    <link rel="stylesheet" href="https://allwinware.github.io/Front-End/alphaseat/alpha_pc/resource/css/pc_path.css">
    <script type="text/javascript" src="https://allwinware.github.io/Front-End/alphaseat/alpha_pc/resource/js/jquery-3.4.1.min.js"></script>
    <script type="text/javascript" src="https://allwinware.github.io/Front-End/alphaseat/alpha_pc/resource/js/selectric/jquery.selectric.min.js"></script>
    <script type="text/javascript" src="https://allwinware.github.io/Front-End/alphaseat/alpha_pc/resource/js/alpha.pc.ui.js"></script>
</head>

<body onload="openEventPopup()">
    <main role="main" class="ags-wrap">
        <section id="ags-container" class="ags-container" data-page-id="path">
            <!--안보이게. block 바꾸고 onload 방식 바꾸면 됨-->
            <div class="content-wrap" style="display: none;">
                <td>event_popup</td>
                <td><a href="#none" target="_self" data-popup="#event_popup">event_popup</a></td>
                <hr>
            </div>
        </section>
    </main>

    <div id="event_popup" class="pop-area" data-type="alert">
        <div class="pop-wrap">
            <section class="pop-container">
                <div class="ico-wrap">
                    <img src="https://allwinware.github.io/Front-End/alphaseat/alpha_pc/resource/img/common/bn_01_2x.jpg" style="width: 100%;">
                </div>
                <h3 class="alert-title">주루 면세 구매 안내</h3>
                <div class="alert-text">
                    몰랐떠 내 시간이 너~ 무 아깝다.<br>
                    동일 주류 2병 구매시 한병은 20% OFF<br>
                    +추가 한병은 40% OFF
                </div>
            </section>
            <div class="pay_save" style="position: unset;">
                <button type="button" class="bctd1" data-role="close">오늘 하루 안열기</button>
                <button type="button" class="bctd2 orang" data-role="close">확인</button>
            </div>
        </div>
    </div>

    <script>
        function openEventPopup() {
            $('[data-popup="#event_popup"]').trigger('click');
        }
    </script>
</body>

</html>
