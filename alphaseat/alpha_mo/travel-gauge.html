<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>리스크 계기판</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ══════════════════════════════════════════════
   ★ 배경이미지 변경은 여기 URL만 수정하세요
══════════════════════════════════════════════ */
:root {
  --bg-image: url(../img/common/grape_mu.jpg);
}

body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
  background: var(--bg-image, #dde) center center / cover no-repeat;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.outer-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 480px;
}

.gauge-container {
  background: rgba(255, 255, 255, 0.93);
  border-radius: 16px;
  padding: 18px 8px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.13);
}

.gauge-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  min-width: 0;
  padding: 0 6px;
}

.gauge-item + .gauge-item {
  border-left: 1px solid #e0e0e0;
}

.gauge-title {
  font-size: 11px;
  color: #777;
  margin-bottom: 4px;
  display: flex;
  align-items: baseline;
  gap: 3px;
  white-space: nowrap;
}

.risk-label {
  font-size: 12px;
  font-weight: 700;
}

/* SVG 게이지: 부모 너비 꽉 채우기 */
.gauge-svg-wrap {
  width: 100%;
  position: relative;
}

.gauge-svg-wrap svg {
  width: 100%;
  height: auto;
  display: block;
  overflow: visible;
}

.score-num {
  font-size: clamp(18px, 5.5vw, 26px);
  font-weight: 700;
  margin-top: 2px;
  min-height: 30px;
  opacity: 0;
  transition: opacity 0.4s;
}

.sub-msg {
  font-size: clamp(9px, 2.6vw, 11px);
  color: #4A9CC8;
  margin-top: 2px;
  min-height: 15px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s;
  white-space: nowrap;
}

</style>
</head>
<body>

<div class="outer-wrap">
  <div class="gauge-container" id="gaugeContainer"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   ★ 설정 — 여기만 수정하세요
══════════════════════════════════════════════ */
const AGE_GROUP = '아이';
/* 아이: 15세 이하 | 성인: 70세 이하 | 윗어른: 70세 이상 */

const DATA = [
  {
    id: 'disease',
    label: '질병상해',
    score: 4.5,
    riskLabels: ['낮은 편','보통','조금걱정','걱정','많이 걱정'],
    showMedical: true
  },
  {
    id: 'damage',
    label: '파손도난',
    score: 3.7,
    riskLabels: ['낮은 편','보통','조금주의','주의','많이 주의'],
    showMedical: false
  },
  {
    id: 'delay',
    label: '지연결항',
    score: 1.9,
    riskLabels: ['낮은 편','보통','조금걱정','걱정','많이 걱정'],
    showMedical: false
  }
];
/* ══════════════════════════════════════════════ */

function getColor(score) {
  if (score < 1) return '#F5C800';
  if (score < 2) return '#F5A623';
  if (score < 3) return '#E8612A';
  if (score < 4) return '#D0021B';
  return '#9B0014';
}

function getRiskText(score, labels) {
  /* 0~1 → 0번, 1~2 → 1번, ..., 4~5 → 4번 */
  const idx = Math.max(0, Math.min(Math.floor(score), 4));
  return labels[idx];
}

function getMedicalText(score, group) {
  if (score < 1.0) return '';
  if (score < 2.0) return `(${group}) 의료대비 필요`;
  if (score < 3.0) return `(${group}) 의료대비 권장`;
  if (score < 4.0) return `(${group}) 의료대비 적극 권장`;
  return `(${group}) 의료대비 필수`;
}

/* 점수(0~5) → 바늘 각도
   바늘은 12시(위)가 기본 → -90°=9시, +90°=3시
   0점=-90°, 5점=+90° */
function scoreToAngle(score) {
  return -90 + (score / 5) * 180;
}

/* 도넛 호 path */
function arcPath(cx, cy, r, a1, a2, thick) {
  const d = n => n * Math.PI / 180;
  const ro = r, ri = r - thick;
  const x1 = cx + ro*Math.cos(d(a1)), y1 = cy + ro*Math.sin(d(a1));
  const x2 = cx + ro*Math.cos(d(a2)), y2 = cy + ro*Math.sin(d(a2));
  const x3 = cx + ri*Math.cos(d(a2)), y3 = cy + ri*Math.sin(d(a2));
  const x4 = cx + ri*Math.cos(d(a1)), y4 = cy + ri*Math.sin(d(a1));
  const lg = (a2-a1) > 180 ? 1 : 0;
  return `M${x1} ${y1} A${ro} ${ro} 0 ${lg} 1 ${x2} ${y2} L${x3} ${y3} A${ri} ${ri} 0 ${lg} 0 ${x4} ${y4}Z`;
}

/* SVG 게이지 생성
   중심(cx=90, cy=96): viewBox 맨 아래 = 반원이 위쪽으로 열림(9시~3시)
   호 각도: -180°(9시) ~ 0°(3시)
   바늘: 12시(위) 방향이 기본 → rotate(-90)=9시, rotate(+90)=3시
   중심 원 없음 */
function buildSVG(id) {
  const cx = 90, cy = 96, r = 86, thick = 24;

  const segs = [
    { a1:-180, a2:-144, color:'#F5C800' },
    { a1:-144, a2:-108, color:'#F5A623' },
    { a1:-108, a2: -72, color:'#E8612A' },
    { a1: -72, a2: -36, color:'#D0021B' },
    { a1: -36, a2:   0, color:'#9B0014' },
  ];

  const arcs = segs.map(s =>
    `<path d="${arcPath(cx,cy,r,s.a1,s.a2,thick)}" fill="${s.color}"/>`
  ).join('');

  /* 바늘: 12시(위) 기준으로 그려져 있음
     tip = cy-80(위), base = cy(중심축)
     rotate(-90)이면 9시, rotate(+90)이면 3시 */
  const needle = `
<g id="needle_${id}" transform="rotate(-90,${cx},${cy})">
  <polygon points="${cx},${cy-80} ${cx-3},${cy} ${cx+3},${cy}"
    fill="#1c1c1c" opacity="0.87"/>
  <polygon points="${cx},${cy-80} ${cx-0.75},${cy} ${cx+0.75},${cy}"
    fill="#ffffff" opacity="0.38"/>
</g>`;

  return `<svg viewBox="0 0 180 96" xmlns="http://www.w3.org/2000/svg" overflow="visible">
  <defs>
    <filter id="ns_${id}" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.2"
        flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  ${arcs}
  <g filter="url(#ns_${id})">${needle}</g>
</svg>`;
}

/* 카드 빌드 */
function buildCards() {
  const wrap = document.getElementById('gaugeContainer');
  DATA.forEach(d => {
    const col = getColor(d.score);
    const el = document.createElement('div');
    el.className = 'gauge-item';
    el.innerHTML = `
      <div class="gauge-title">
        ${d.label}&nbsp;<span class="risk-label" style="color:${col}">${getRiskText(d.score,d.riskLabels)}</span>
      </div>
      <div class="gauge-svg-wrap">${buildSVG(d.id)}</div>
      <div class="score-num" id="sc_${d.id}" style="color:${col}"></div>
      <div class="sub-msg"   id="mt_${d.id}"></div>
    `;
    wrap.appendChild(el);
  });
}

function setNeedle(id, deg) {
  const el = document.getElementById('needle_'+id);
  if (el) el.setAttribute('transform', `rotate(${deg},90,96)`);
}

const easeOut = t => 1 - Math.pow(1-t, 3);

function animateGauge(d, delay) {
  const target = scoreToAngle(d.score);
  setTimeout(() => {
    let phase=1, t0=null;
    function tick(ts) {
      if (!t0) t0=ts;
      const elapsed=ts-t0;
      if (phase===1) {
        /* 1단계: 9시(-90°)→3시(+90°)→9시 왕복 스캔 */
        const t=Math.min(elapsed/1000,1);
        setNeedle(d.id, -90 + Math.abs(Math.sin(t*Math.PI))*180);
        t<1 ? requestAnimationFrame(tick) : (phase=2,t0=null,requestAnimationFrame(tick));
      } else if (phase===2) {
        /* 2단계: 목표로 감속 이동 */
        const t=Math.min(elapsed/900,1);
        setNeedle(d.id, -90 + easeOut(t)*(target+90));
        t<1 ? requestAnimationFrame(tick) : (phase=3,t0=null,requestAnimationFrame(tick));
      } else if (phase===3) {
        /* 3단계: 미동 후 정지 */
        const t=Math.min(elapsed/700,1);
        setNeedle(d.id, target + Math.sin(t*Math.PI*4)*(1-t)*5);
        if (t<1) { requestAnimationFrame(tick); }
        else {
          setNeedle(d.id, target);
          const sc=document.getElementById('sc_'+d.id);
          const mt=document.getElementById('mt_'+d.id);
          if (sc) { sc.textContent=d.score.toFixed(1); sc.style.opacity='1'; }
          if (mt && d.showMedical) { mt.textContent=getMedicalText(d.score,AGE_GROUP); mt.style.opacity='1'; }
        }
      }
    }
    requestAnimationFrame(tick);
  }, delay);
}

buildCards();
DATA.forEach((d,i) => animateGauge(d, i*280));
</script>
</body>
</html>
