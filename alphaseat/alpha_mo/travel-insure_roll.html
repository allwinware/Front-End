<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>보험 보상 실사례</title>
  <style > * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f8ff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
}
.outer-risk {
    width: 100%;
    max-width: 600px;
    padding: 1.2rem;
}
.top-row-risk {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.9rem;
}
.top-title-risk {
    font-size: 16px;
    font-weight: 400;
    color: #1a1a2e;
}
.top-title-risk b {
    font-weight: 600;
}
.user-count-risk {
    font-size: 13px;
    color: #185FA5;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
}
.box-risk {
    background: #EEF6FF;
    border: 1px solid #B5D4F4;
    border-radius: 16px;
    overflow: hidden;
}
.tabs-risk {
    display: flex;
    border-bottom: 1.5px solid #c5d8ef;
    padding: 0 1.4rem;
}
.tab-risk {
    font-size: 14px;
    font-weight: 400;
    color: #7a99bb;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    transition: color 0.2s, border-color 0.2s;
}
.tab-risk.active-risk {
    color: #185FA5;
    border-bottom: 2.5px solid #185FA5;
    font-weight: 600;
}
.chart-wrap-risk {
    position: relative;
    width: 100%;
    height: 200px;
}
.bars-risk {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: flex-end;
    gap: 1px;
    height: 100%;
}
.bar-risk {
    border-radius: 2px 2px 0 0;
    flex: 1;
    min-width: 0;
    background: #c8d9ec;
    transition: background 0.3s;
}
.vline-risk {
    position: absolute;
    bottom: 0;
    width: 1.5px;
    background: #E24B4A;
    pointer-events: none;
    display: none;
    transform: translateX(-50%);
}
.connector-risk {
    position: absolute;
    width: 1.5px;
    background: #E24B4A;
    pointer-events: none;
    display: none;
    transform: translateX(-50%);
}
.dot-risk {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #E24B4A;
    border: 2.5px solid #EEF6FF;
    pointer-events: none;
    display: none;
    transform: translateX(-50%);
}
.tooltip-card-risk {
    position: absolute;
    background: #fff;
    border: 1px solid #cde3f8;
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 14px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s;
}
.tooltip-name-risk {
    color: #666;
    font-size: 12.5px;
}
.tooltip-amount-risk {
    color: #185FA5;
    font-weight: 600;
    font-size: 14px;
}
</style>
</head>
<body>
  <div class="outer-risk">
    <div class="top-row-risk">
      <p class="top-title-risk">실제, 많은 분들이 <b>보상</b>을 받으셨어요!</p>
      <span class="user-count-risk">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="5.5" r="3" fill="#185FA5"/>
          <path d="M2 13c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        13,224
      </span>
    </div>
    <div class="box-risk">
      <div class="tabs-risk">
        <div class="tab-risk active-risk" id="tab-0">해외의료</div>
        <div class="tab-risk" id="tab-1">파손도난</div>
        <div class="tab-risk" id="tab-2">지연결항</div>
      </div>
      <div class="chart-wrap-risk" id="chartArea">
        <div class="bars-risk" id="barsEl"></div>
        <div class="vline-risk" id="vline"></div>
        <div class="connector-risk" id="connector"></div>
        <div class="dot-risk" id="dot"></div>
        <div class="tooltip-card-risk" id="tooltip">
          <span class="tooltip-name-risk" id="ttName"></span>
          <span class="tooltip-amount-risk" id="ttAmount"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SHOW_MS = 2500;
    const FADE_MS = 300;
    const BAR_COUNT = 50;

    const data = {
      0: [
        { name: "정**님 | 고열·복통 입원치료..", amount: "129만원 보상", barPos: 0.18 },
        { name: "최**님 | 맹장수술 응급입원..", amount: "320만원 보상", barPos: 0.36 },
        { name: "이**님 | 스키 타다 골절 입원..", amount: "540만원 보상", barPos: 0.54 },
        { name: "박**님 | 건널목 교통사고로..", amount: "1,530만원 보상", barPos: 0.72 },
        { name: "김**님 | 오토바이 교통사고...", amount: "2,850만원 보상", barPos: 0.90 },
      ],
      1: [
        { name: "오**님 | 수하물 분실..", amount: "46만원 보상", barPos: 0.18 },
        { name: "이**님 | 여행 중 카메라 파손..", amount: "85만원 보상", barPos: 0.36 },
        { name: "장**님 | 귀중품 파손..", amount: "130만원 보상", barPos: 0.54 },
        { name: "조**님 | 전자기기 도난..", amount: "175만원 보상", barPos: 0.72 },
        { name: "한**님 | 노트북 도난 피해..", amount: "210만원 보상", barPos: 0.90 },
      ],
      2: [
        { name: "윤**님 | 항공편 4시간 지연..", amount: "32만원 보상", barPos: 0.18 },
        { name: "문**님 | 연결편 지연 8시간..", amount: "41만원 보상", barPos: 0.36 },
        { name: "강**님 | 결항으로 숙박 추가..", amount: "58만원 보상", barPos: 0.54 },
        { name: "권**님 | 악천후 결항 대기..", amount: "67만원 보상", barPos: 0.72 },
        { name: "신**님 | 허리케인으로 결항..", amount: "95만원 보상", barPos: 0.90 },
      ]
    };

    function barHeightAt(pos) {
      return 0.04 + Math.pow(pos, 1.7) * 0.88;
    }

    const barsEl = document.getElementById('barsEl');
    const vlineEl = document.getElementById('vline');
    const dotEl = document.getElementById('dot');
    const connectorEl = document.getElementById('connector');
    const tooltipEl = document.getElementById('tooltip');
    const ttName = document.getElementById('ttName');
    const ttAmount = document.getElementById('ttAmount');
    const chartArea = document.getElementById('chartArea');
    const tabs = [0,1,2].map(i => document.getElementById('tab-' + i));

    const barHeights = [];
    for (let i = 0; i < BAR_COUNT; i++) {
      const pos = i / (BAR_COUNT - 1);
      barHeights.push(barHeightAt(pos));
    }

    function buildBars() {
      barsEl.innerHTML = '';
      barHeights.forEach(h => {
        const bar = document.createElement('div');
        bar.className = 'bar-risk';
        bar.style.height = (h * 100) + '%';
        barsEl.appendChild(bar);
      });
    }
    buildBars();

    function getBarEls() { return barsEl.querySelectorAll('.bar-risk'); }

    function posToBarIdx(pos) {
      return Math.round(pos * (BAR_COUNT - 1));
    }

    function barIdxToX(barIdx) {
      const areaW = chartArea.offsetWidth;
      const barW = areaW / BAR_COUNT;
      return barIdx * barW + barW / 2;
    }

    function showItem(tab, itemIdx) {
      const item = data[tab][itemIdx];
      const barIdx = posToBarIdx(item.barPos);
      const areaW = chartArea.offsetWidth;
      const areaH = chartArea.offsetHeight;
      const x = barIdxToX(barIdx);
      const bH = barHeights[barIdx];
      const barTopY = areaH * (1 - bH);

      const allBars = getBarEls();
      allBars.forEach((b, i) => {
        b.style.background = i === barIdx ? '#E24B4A' : '#c8d9ec';
      });

      vlineEl.style.display = 'block';
      vlineEl.style.left = x + 'px';
      vlineEl.style.height = (bH * areaH) + 'px';

      dotEl.style.display = 'block';
      dotEl.style.left = x + 'px';
      dotEl.style.top = (barTopY - 6) + 'px';

      ttName.textContent = item.name;
      ttAmount.textContent = item.amount;
      tooltipEl.style.display = 'flex';
      tooltipEl.style.opacity = '0';
      tooltipEl.style.left = '0px';
      tooltipEl.style.top = '0px';

      requestAnimationFrame(() => {
        const tw = tooltipEl.offsetWidth;
        const th = tooltipEl.offsetHeight;
        const MARGIN = 8;
        const tooltipTopY = Math.max(MARGIN, barTopY - th - 16);

        let tooltipLeft = x - tw / 2;
        if (tooltipLeft < MARGIN) tooltipLeft = MARGIN;
        if (tooltipLeft + tw > areaW - MARGIN) tooltipLeft = areaW - tw - MARGIN;

        const connTop = tooltipTopY + th;
        const connH = barTopY - connTop;

        tooltipEl.style.left = tooltipLeft + 'px';
        tooltipEl.style.top = tooltipTopY + 'px';

        connectorEl.style.display = 'block';
        connectorEl.style.left = x + 'px';
        connectorEl.style.top = connTop + 'px';
        connectorEl.style.height = Math.max(0, connH) + 'px';

        requestAnimationFrame(() => { tooltipEl.style.opacity = '1'; });
      });
    }

    function hideAll(cb) {
      tooltipEl.style.opacity = '0';
      getBarEls().forEach(b => b.style.background = '#c8d9ec');
      setTimeout(() => {
        tooltipEl.style.display = 'none';
        vlineEl.style.display = 'none';
        dotEl.style.display = 'none';
        connectorEl.style.display = 'none';
        cb && cb();
      }, FADE_MS);
    }

    let currentTab = 0, currentItem = 0, timer = null;
    function setActiveTab(idx) { tabs.forEach((t, i) => t.classList.toggle('active-risk', i === idx)); }

    function nextStep() {
      showItem(currentTab, currentItem);
      timer = setTimeout(() => {
        hideAll(() => {
          currentItem++;
          if (currentItem >= data[currentTab].length) {
            currentItem = 0;
            currentTab = (currentTab + 1) % 3;
            setActiveTab(currentTab);
          }
          nextStep();
        });
      }, SHOW_MS);
    }

    tabs.forEach((t, i) => {
      t.addEventListener('click', () => {
        clearTimeout(timer);
        hideAll(() => { currentTab = i; currentItem = 0; setActiveTab(i); nextStep(); });
      });
    });

    setTimeout(nextStep, 400);
  </script>
</body>
</html>
