	<script>				
	/*보험 함수*/
		const notices = [
		{ text: "이**님 | 구토 설사로 인한 탈수증상으로 입원/검사", amount: "125만원 보상" },
		{ text: "박**님 | 방콕 여행 중 오토바이 사고 응급실 치료", amount: "340만원 보상" },
		{ text: "김**님 | 수하물 분실로 인한 여행용품 긴급 구매", amount: "89만원 보상" },
		{ text: "최**님 | 비행기 지연으로 인한 추가 숙박비 발생", amount: "42만원 보상" },
		{ text: "정**님 | 해외 치과 응급 치료 (방콕 치료 포함)", amount: "210만원 보상" },
		];

		let noticeIdx = 0;
		const track = document.getElementById('noticeTrack');

		function buildNotice() {
		track.innerHTML = '';
		[0, 1, 2].forEach(offset => {
			const d = notices[(noticeIdx + offset) % notices.length];
			const el = document.createElement('div');
			el.className = 'notice-item';
			el.innerHTML = `<span class="notice-text">${d.text}</span><span class="notice-amount">${d.amount}</span>`;
			track.appendChild(el);
		});
		track.style.transition = 'none';
		track.style.transform = 'translateY(0)';
		}

		function cycleNotice() {
		track.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
		track.style.transform = 'translateY(-36px)';
		setTimeout(() => {
			noticeIdx = (noticeIdx + 1) % notices.length;
			buildNotice();
		}, 520);
		}

		buildNotice();
		setInterval(cycleNotice, 2500);

			</script>
